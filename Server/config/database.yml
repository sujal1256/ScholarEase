# PostgreSQL. Versions 9.3 and up are supported.
# Ensure the pg gem is in your Gemfile: gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: server_development
  url: <%= ENV["DATABASE_URL"] if ENV["DATABASE_URL"].present? %>

# Do not set test db to the same as development or production.
test:
  <<: *default
  database: server_test
  url: <%= ENV["DATABASE_URL"] if ENV["DATABASE_URL"].present? %>

# When DATABASE_URL is set (e.g. Heroku, Render), it is used.
# Otherwise database/username/password are used; never commit real passwords.
production:
  <<: *default
  database: server_production
  username: server
  password: <%= ENV["SERVER_DATABASE_PASSWORD"] %>
  url: <%= ENV["DATABASE_URL"] if ENV["DATABASE_URL"].present? %>
